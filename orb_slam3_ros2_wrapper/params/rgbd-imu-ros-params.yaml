# Add a "/" at the start of the topics to avoid namespacing
# The frame_ids are automatically namespaced in the launch files.

ORB_SLAM3_RGBD_ROS2:
  ros__parameters:
    # slam related
    robot_base_frame: base_footprint
    global_frame: map
    odom_frame: odom
    rgb_image_topic_name: /camera/image_raw
    depth_image_topic_name: /camera/depth/image_raw
    imu_topic_name: /imu/data
    use_imu: true

    # transform from base_footprint -> camera_link
    robot_x: 0.7
    robot_y: 0.0
    robot_z: 1.150
    robot_qx: 0.0
    robot_qy: 0.0
    robot_qz: 0.0
    robot_qw: 1.0

    visualization: true
    odometry_mode: false
    publish_tf: true
    map_data_publish_frequency: 1000
    do_loop_closing: true
